<!DOCTYPE html>
<html>
<head>
<title>Contact Form</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
}

.container{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#007BFF;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>

</head>

<body>

<div class="container">

<h2>Send us a message</h2>

<form action="https://formsubmit.co/kedibonecavil@gmail.com" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="subject" placeholder="Subject">

<textarea name="message" rows="6" placeholder="Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
